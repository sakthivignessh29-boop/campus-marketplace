# Server Config
server.port=8080

# H2 Database Config (Persistent File Storage)
spring.datasource.url=jdbc:h2:file:~/campusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (Secret must be at least 256 bits / 32 characters)
app.jwt.secret=9a7c3d18e24c5208f237190f8902891d293817ab536e289f38f712acde345f89
app.jwt.expiration-ms=86400000

# Gemini API Config
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.url=https://generativetutorials.googleapis.com/v1beta/models/gemini-pro:generateContent

# File upload directory for local mock storage
app.upload.dir=./uploads

