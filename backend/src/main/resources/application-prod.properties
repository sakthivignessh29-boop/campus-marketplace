# Server Config (Zoho Catalyst AppSail dynamic port)
server.port=${X_ZOHO_CATALYST_LISTEN_PORT:8080}

# PostgreSQL Database Config (Read from environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:9a7c3d18e24c5208f237190f8902891d293817ab536e289f38f712acde345f89}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Gemini API Config
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.url=https://generativetutorials.googleapis.com/v1beta/models/gemini-pro:generateContent
